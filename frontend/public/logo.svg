<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Handle Gradient -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb74d" />
      <stop offset="100%" stop-color="#ff8a00" />
    </linearGradient>

    <!-- Lens Gradient for that glass effect -->
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.2" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#005bff" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Bottom drop shadow -->
  <ellipse cx="256" cy="460" rx="160" ry="18" fill="#60708a" fill-opacity="0.2" />

  <!-- Document Base -->
  <rect x="110" y="70" width="220" height="340" rx="16" fill="#00d4ff" filter="url(#shadow)" />
  
  <!-- Document Lines -->
  <rect x="140" y="120" width="160" height="28" rx="14" fill="#005bff" />
  <rect x="140" y="180" width="160" height="28" rx="14" fill="#005bff" />
  <rect x="140" y="240" width="160" height="28" rx="14" fill="#005bff" />
  <rect x="140" y="300" width="100" height="28" rx="14" fill="#005bff" />
  <rect x="140" y="360" width="120" height="28" rx="14" fill="#005bff" />

  <!-- Magnifying Glass Handle -->
  <!-- Base of handle -->
  <path d="M 330 330 L 420 420" stroke="url(#handleGrad)" stroke-width="50" stroke-linecap="round" filter="url(#shadow)" />
  
  <!-- Magnifying Glass Lens & Rim -->
  <g filter="url(#shadow)">
    <!-- Lens Base (Transparent to show document) -->
    <circle cx="280" cy="280" r="110" fill="#f8fbff" fill-opacity="0.4" />
    
    <!-- Thick Rim -->
    <circle cx="280" cy="280" r="110" fill="none" stroke="#00a3ff" stroke-width="32" />
    
    <!-- Inner Rim Highlight -->
    <circle cx="280" cy="280" r="94" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="4" />
    
    <!-- Lens Glass Gradient overlay -->
    <circle cx="280" cy="280" r="94" fill="url(#lensGrad)" />
    
    <!-- Reflection Highlight -->
    <path d="M 210 230 A 70 70 0 0 1 260 195" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
